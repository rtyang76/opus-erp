# Opus ERP Application Configuration
# 敏感配置必须从环境变量读取，禁止硬编码

server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev

  # Application name
  application:
    name: opus-erp

  # Jackson configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # SQL Server Datasource
  # 注意：mssql-jdbc 12.x + SQL Server 2022 下，encrypt=false 会被服务器强制加密忽略，
  # 导致 SSL 握手阻塞。改用 encrypt=true + trustServerCertificate=true 主动配合 TLS。
  datasource:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    url: jdbc:sqlserver://localhost:1433;databaseName=opus_erp;encrypt=true;trustServerCertificate=true
    username: sa
    password: LC_svr1

  # Flyway configuration
  # 注意：表已手动创建，禁用 Flyway
  flyway:
    enabled: false

  # Redis configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.opus.erp.**.entity

# JWT configuration
jwt:
  secret: opus-erp-jwt-secret-key-at-least-256-bits-long-for-hmac-sha256
  expiration: 7200
  refresh-expiration: 604800

# Logging configuration
logging:
  level:
    root: INFO
    com.opus.erp: DEBUG
